<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attivazione NoAway</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      padding: 24px;
      background: #1a1a1a;
      color: #e0e0e0;
      min-width: 360px;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 20px 0;
      font-weight: 600;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: #a0a0a0;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 0.95rem;
      border: 1px solid #404040;
      border-radius: 6px;
      background: #2a2a2a;
      color: #e0e0e0;
    }
    input:focus {
      outline: none;
      border-color: #0a84ff;
    }
    input::placeholder {
      color: #606060;
    }
    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      background: #0a84ff;
      color: #fff;
      cursor: pointer;
    }
    .btn:hover { background: #0066cc; }
    .btn:disabled {
      background: #404040;
      color: #888;
      cursor: not-allowed;
    }
    .error {
      margin-top: 12px;
      padding: 10px 12px;
      font-size: 0.9rem;
      background: rgba(255, 60, 60, 0.15);
      border: 1px solid rgba(255, 60, 60, 0.4);
      border-radius: 6px;
      color: #ff6b6b;
      display: none;
    }
    .error.visible { display: block; }
    .hint {
      font-size: 0.75rem;
      color: #808080;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>Attivazione licenza NoAway</h1>
  <p style="color: #a0a0a0; font-size: 0.9rem; margin: 0 0 20px 0;">Inserisci l'email usata per l'acquisto e la chiave di licenza ricevuta.</p>
  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" />
  </div>
  <div class="field">
    <label for="licenseKey">Chiave di licenza</label>
    <input type="text" id="licenseKey" placeholder="NOAWAY-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false" />
  </div>
  <button type="button" class="btn" id="activateBtn">Attiva</button>
  <div class="error" id="error" role="alert"></div>
  <p class="hint">La licenza è valida per un numero limitato di dispositivi. Non hai una chiave? Acquista su noaway.app</p>
  <script src="activationWindow.js"></script>
</body>
</html>

appId: com.noaway.app
productName: NoAway
directories:
  output: dist
files:
  - "**/*"
  - "!dist/**"
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: assets/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - target: dmg
      arch:
        - universal
  # Un solo .dmg per Intel e Apple Silicon. Per due .dmg separati: npm run build:mac -- --arm64 --x64
  category: public.app-category.utilities
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
